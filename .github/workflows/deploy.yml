name: Deploy All Websites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build SkillForge
        run: |
          cd websites/website-03-skillforge
          npm ci
          npm run build

      - name: Build Apex Fitness
        run: |
          cd websites/website-04-apex-fitness
          npm ci
          npm run build

      - name: Build FrameWorth
        run: |
          cd websites/website-05-frameworth
          npm ci
          npm run build

      - name: Prepare combined site directory
        run: |
          mkdir -p _site/skillforge _site/apex-fitness _site/frameworth
          cp -r websites/website-03-skillforge/dist/. _site/skillforge/
          cp -r websites/website-04-apex-fitness/dist/. _site/apex-fitness/
          cp -r websites/website-05-frameworth/dist/. _site/frameworth/
          echo "=== Site structure ==="
          ls _site/
          echo "--- SkillForge ---"
          ls _site/skillforge/ | head -5
          echo "--- Apex Fitness ---"
          ls _site/apex-fitness/ | head -5
          echo "--- FrameWorth ---"
          ls _site/frameworth/ | head -5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4